[settings]
npm.package_manager = "pnpm"

[tools]
"go:github.com/irskep/autowt" = "v0.6.0"
node = "lts"
'npm:@earendil-works/pi-coding-agent' = 'latest'
'npm:@github/copilot' = 'latest'
'npm:@googleworkspace/cli' = { version = 'latest', allow_builds = ['@googleworkspace/cli'] }
'npm:@openai/codex' = 'latest'
'npm:claudefm' = 'latest'
'npm:git-trim' = 'latest'
'npm:gnomon' = 'latest'
'npm:npm-check-updates' = 'latest'
'npm:opencode-ai' = { version = 'latest', allow_builds = ['opencode-ai'] }
'npm:oxfmt' = 'latest'
'npm:oxlint' = 'latest'
'npm:socket.io-cli' = 'latest'
'npm:webtorrent-cli' = { version = 'latest', allow_builds = ['bufferutil', 'ip-set', 'node-datachannel', 'protobufjs', 'utf-8-validate', 'utp-native'] }
'npm:wscat' = 'latest'
pnpm = 'latest'

[tasks]

install = "pnpm install"

fmt-ts = "oxfmt $(find . -maxdepth 1 -name '*.ts' -type f | sort)"

fmt-shell = "shfmt -w *.sh zshrc bashrc"

fmt-md = "markdownfmt -w *.md"

fmt-check = "oxfmt --check $(find . -maxdepth 1 -name '*.ts' -type f | sort)"

lint = "oxlint --deny-warnings $(find . -maxdepth 1 -name '*.ts' -type f | sort)"

check = "shellcheck -x *.sh"

clean = "rm -rf .tsgo-build"

cleanup-mise = "./cleanup_mise.sh"

distclean = "rm -rf .tsgo-build node_modules"

update-vim = "git submodule update --recursive --remote"

[tasks.fmt]
depends = ["fmt-shell", "fmt-md", "fmt-ts"]

[tasks.format]
depends = ["fmt"]

[tasks.all]
depends = ["fmt", "check"]

[tasks.format-check]
depends = ["fmt-check"]

[tasks.typecheck]
depends = ["install"]
run = "pnpm exec tsgo --noEmit --module nodenext --moduleResolution nodenext --target es2024 --types node --skipLibCheck reorder.ts summarize_clones.ts resolve_clones.ts migrate_clones_to_worktrees.ts"

[tasks.build]
depends = ["install"]
run = "rm -rf .tsgo-build && pnpm exec tsgo --module nodenext --moduleResolution nodenext --target es2024 --types node --skipLibCheck --outDir .tsgo-build reorder.ts summarize_clones.ts resolve_clones.ts migrate_clones_to_worktrees.ts"

[tasks.reorder]
depends = ["build"]
run = "node .tsgo-build/reorder.js"

[tasks.summarize-clones]
depends = ["build"]
run = "node .tsgo-build/summarize_clones.js"

[tasks.resolve-clones]
depends = ["build"]
run = "node .tsgo-build/resolve_clones.js"

[tasks.migrate-clones-to-worktrees]
depends = ["build"]
run = "node .tsgo-build/migrate_clones_to_worktrees.js"

[tasks.upgrade]
depends = ["install"]
run = "pnpm exec npm-check-updates -u && pnpm install && mise run build"

[tasks.default]
depends = ["build"]
run = "node .tsgo-build/reorder.js"
